apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  generators:
    - merge:
        mergeKeys:
          - name
        generators:
          - git:
              repoURL: https://github.com/hadcrab/k8s-homelab-manifests.git
              revision: HEAD
              directories:
                - path: charts/*
          - list:
              elements:
                - name: metallb
                  namespace: metallb-system
                - name: traefik
                  namespace: traefik-system
                - name: certmgr
                  namespace: cert-manager
                - name: longhorn
                  namespace: longhorn
                - name: monitoring-crds
                  namespace: monitoring
                - name: monitoring
                  namespace: monitoring
                - name: argocd
                  namespace: argocd
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/hadcrab/k8s-homelab-manifests.git
        targetRevision: HEAD
        path: 'charts/{{name}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
