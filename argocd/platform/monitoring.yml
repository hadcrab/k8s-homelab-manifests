apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.18.0
      helm:
        values: |
          alertmanager:
            enabled: false

          grafana:
            resources:
              limits:
                memory: 256Mi
              requests:
                memory: 128Mi
            adminPassword: admin

          kubeStateMetrics:
            resources:
              limits:
                memory: 256Mi
              requests:
                memory: 128Mi

          prometheus:
            prometheusSpec:
              scrapeInterval: 60s
              evaluationInterval: 60s
              retention: 2d
              resources:
                limits:
                  memory: 512Mi
                requests:
                  memory: 256Mi
            ingress:
              enabled: false

          nodeExporter:
            resources:
              limits:
                memory: 64Mi
              requests:
                memory: 32Mi
    - repoURL: https://github.com/hadcrab/k8s-homelab-manifests.git
      targetRevision: HEAD
      path: platform/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
