apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: argo-ui-tls
  commonName: "argocd.{{ .Values.domainSuffix }}"
  dnsNames:
    - "argocd.{{ .Values.domainSuffix }}"
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer
