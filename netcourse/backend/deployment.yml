apiVersion: apps/v1
kind: Deployment
metadata:
  name: netcourse-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netcourse-backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: netcourse-backend
    spec:
      containers:
      - env:
        - name: DB_HOST
          value: netcourse-postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          value: netcourse
        - name: DB_NAME
          value: netcourse
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              key: JWT_SECRET
              name: netcourse-backend-secret
        - name: PASSWORD_PEPPER
          valueFrom:
            secretKeyRef:
              key: PASSWORD_PEPPER
              name: netcourse-backend-secret
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: netcourse-postgres-secret
        - name: R2_ENDPOINT
          value: http://minio:9000
        - name: R2_ACCESS_KEY_ID
          value: minioadmin
        - name: R2_SECRET_ACCESS_KEY
          value: minioadmin
        - name: R2_BUCKET_NAME
          value: netcourse
        - name: R2_PUBLIC_DOMAIN
          value: "minio:9000"
        image: ghcr.io/hadcrab/netcourse-backend:latest
        imagePullPolicy: Always
        name: netcourse-backend
        ports:
        - containerPort: 3000
          protocol: TCP
      imagePullSecrets:
      - name: ghcr-pull
