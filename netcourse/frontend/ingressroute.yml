apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netcourse-frontend
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`netcourse.kube`) && PathPrefix(`/api`)
    services:
      - name: netcourse-backend
        port: 8080
  - kind: Rule
    match: Host(`netcourse.kube`)
    services:
    - name: netcourse-frontend
      port: 3000
  tls:
    secretName: netcourse-frontend-tls
