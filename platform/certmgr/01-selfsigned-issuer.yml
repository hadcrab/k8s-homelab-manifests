# Uses self-signed CA (no real domain).
# To use Let's Encrypt instead:
#   1. Replace ClusterIssuer with:
#      kind: ClusterIssuer
#      spec:
#        acme:
#          server: https://acme-v02.api.letsencrypt.org/directory
#          email: you@domain.com
#          privateKeySecretRef:
#            name: letsencrypt-prod
#          solvers:
#            - http01:
#                ingress: {}
#   2. Point a real domain to your cluster IP
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
