apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.kube`)
      kind: Rule
      services:
        - name: monitoring-grafana
          port: 80
  tls:
    secretName: monitoring-grafana-tls
